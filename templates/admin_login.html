<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Event Hub</title>
    <link rel="stylesheet" href="../static/admin_login.css">
</head>

<body>
    <div class="container">
        <div class="profile">
            <img src="../static/admin.jpeg" alt="Admin Icon">
        </div>

        <div class="heading">
            <h3>ADMIN LOGIN</h3>
        </div>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="error-message">
            <i class="fas fa-exclamation-circle"></i>
            {{ messages[0] }}
        </div>
        {% endif %}
        {% endwith %}

        <form method="POST" action="/login" class="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input class="username" id="username" name="username" type="text" placeholder="Enter your username"
                    required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input class="password" id="password" name="password" type="password" placeholder="Enter your password"
                    required autocomplete="current-password">
            </div>

            <button class="button" type="submit">Sign In</button>
        </form>
    </div>
</body>

</html>
