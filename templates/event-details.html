<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Details - Event Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../static/public_styles.css">
</head>

<body>
    <header class="navbar">
        <div class="logo">
            <a href="/" class="logo-text">Event Hub</a>
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="/#home">Home</a></li>
                <li><a href="/#events">Events</a></li>
                <li><a href="/#about">About</a></li>
                <li><a href="/#contact">Contact</a></li>
            </ul>
        </nav>
        <div class="auth-buttons">
            <a href="/#events" class="btn btn-outline">Back to Events</a>
        </div>
    </header>

    <main class="details-main">
        <article id="event-details-content" class="event-details-page-content">
            <!-- Content will be loaded dynamically by script.js containing hero and deep card -->
            <div style="padding: 100px; text-align: center;">
                <div
                    style="width: 40px; height: 40px; border: 4px solid var(--accent-color); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px;">
                </div>
                <p>Loading premium experience...</p>
                <style>
                    @keyframes spin {
                        100% {
                            transform: rotate(360deg);
                        }
                    }
                </style>
            </div>
        </article>
    </main>

    <footer>
        <p>&copy; 2024 <a href="/admin" class="footer-link">Event Hub</a>. All rights reserved.</p>
    </footer>

    <script src="../static/public_script.js"></script>
</body>

</html>
